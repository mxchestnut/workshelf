version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: matrix-postgres
    environment:
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: synapse
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: matrix-synapse
    depends_on:
      - postgres
    environment:
      # These are used only on first boot if you generate a config.
      # We deploy a static config, so these are informational.
      SYNAPSE_SERVER_NAME: ${SERVER_NAME}
      SYNAPSE_REPORT_STATS: "no"
    volumes:
      - synapse-data:/data
      - ./synapse/homeserver.yaml:/data/homeserver.yaml:ro
      - ./synapse/matrix.log.config:/data/matrix.workshelf.dev.log.config:ro
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: matrix-caddy
    depends_on:
      - synapse
    ports:
      - "80:80"
      - "443:443"
      - "8448:8448"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  postgres-data:
  synapse-data:
  caddy-data:
  caddy-config:
