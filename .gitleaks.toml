title = "Gitleaks Security Scanner"

[extend]
useDefault = true

[allowlist]
description = "Allowlist for known false positives"
paths = [
  '''\.env\.example$''',
  '''README\.md$''',
]

# Additional rules for stricter detection
[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(api_key|apikey|access_key|secret_key|api_token|auth_token)['"]?\s*[:=]\s*['"]?[A-Za-z0-9-_]{20,}'''
keywords = ["api_key", "apikey", "access_key"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
keywords = ["AKIA", "AGPA", "AIDA"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN (RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY( BLOCK)?-----'''
keywords = ["PRIVATE KEY"]
