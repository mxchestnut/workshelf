name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE: workshelf-backend
  FRONTEND_IMAGE: workshelf-frontend
  # Backend environment variables (consolidated)
  BACKEND_ENV_VARS: >-
    DATABASE_URL=secretref:database-url
    ANTHROPIC_API_KEY=secretref:anthropic-api-key
    STRIPE_SECRET_KEY=secretref:stripe-secret-key
    STRIPE_PUBLISHABLE_KEY=secretref:stripe-publishable-key
    STRIPE_WEBHOOK_SECRET=secretref:stripe-webhook-secret
    GPTZERO_API_KEY=secretref:gptzero-api-key
    COPYSCAPE_API_KEY=secretref:copyscape-api-key
    COPYSCAPE_USERNAME=${{ secrets.COPYSCAPE_USERNAME }}
    AWS_REGION=${{ secrets.AWS_REGION }}
    AWS_ACCESS_KEY_ID=secretref:aws-access-key-id
    AWS_SECRET_ACCESS_KEY=secretref:aws-secret-access-key
    FROM_EMAIL=${{ secrets.FROM_EMAIL }}
    FRONTEND_URL=${{ secrets.FRONTEND_URL }}
    CLAUDE_MODEL=claude-sonnet-4-20250514
    SECRET_KEY=secretref:secret-key
    KEYCLOAK_SERVER_URL=${{ secrets.KEYCLOAK_SERVER_URL }}
    KEYCLOAK_REALM=${{ secrets.KEYCLOAK_REALM }}
    KEYCLOAK_CLIENT_ID=${{ secrets.KEYCLOAK_CLIENT_ID }}
    KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/workshelf-backend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/workshelf-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/workshelf-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/workshelf-backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          no-cache: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_KEYCLOAK_URL=${{ secrets.VITE_KEYCLOAK_URL }}
            CACHE_BUST=${{ github.run_number }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/workshelf-frontend:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/workshelf-frontend:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Azure Container App secrets
        run: |
          echo "🔐 Updating secrets for backend container app..."
          az containerapp secret set \
            --name workshelf-backend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --secrets \
              aws-access-key-id="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              aws-secret-access-key="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            || echo "⚠️  Failed to update secrets, will try in create step"
          
          echo "🔐 Updating secrets for Keycloak..."
          az containerapp secret set \
            --name workshelf-keycloak \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --secrets \
              db-password="${{ secrets.NEON_DB_PASSWORD }}" \
            || echo "⚠️  Failed to update Keycloak secrets"

      - name: Deploy backend to Azure Container Apps
        run: |
          az containerapp update \
            --name workshelf-backend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/workshelf-backend:${{ github.sha }} \
            --set-env-vars ${{ env.BACKEND_ENV_VARS }} || \
          az containerapp create \
            --name workshelf-backend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --environment ${{ secrets.AZURE_CONTAINER_ENV }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/workshelf-backend:${{ github.sha }} \
            --target-port 8000 \
            --ingress external \
            --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --secrets \
              database-url="${{ secrets.DATABASE_URL }}" \
              anthropic-api-key="${{ secrets.ANTHROPIC_API_KEY }}" \
              stripe-secret-key="${{ secrets.STRIPE_SECRET_KEY }}" \
              stripe-publishable-key="${{ secrets.STRIPE_PUBLISHABLE_KEY }}" \
              stripe-webhook-secret="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
              gptzero-api-key="${{ secrets.GPTZERO_API_KEY }}" \
              copyscape-api-key="${{ secrets.COPYSCAPE_API_KEY }}" \
              aws-access-key-id="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              aws-secret-access-key="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              secret-key="${{ secrets.SECRET_KEY }}" \
            --env-vars ${{ env.BACKEND_ENV_VARS }} \
            --cpu 0.25 --memory 0.5Gi \
            --min-replicas 1 --max-replicas 2

      - name: Bind custom domain to backend
        run: |
          echo "🌐 Binding custom domain api.workshelf.dev to backend..."
          
          # Check if domain is already bound
          EXISTING_DOMAINS=$(az containerapp hostname list \
            --name workshelf-backend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?name=='api.workshelf.dev'].name" -o tsv)
          
          if [ -z "$EXISTING_DOMAINS" ]; then
            echo "Adding domain binding..."
            az containerapp hostname bind \
              --hostname api.workshelf.dev \
              --name workshelf-backend \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --environment ${{ secrets.AZURE_CONTAINER_ENV }} \
              --validation-method HTTP
            echo "✅ Domain api.workshelf.dev bound successfully"
          else
            echo "✅ Domain api.workshelf.dev already bound"
          fi

      - name: Bind custom domain to Keycloak
        run: |
          echo "🌐 Binding custom domain auth.workshelf.dev to Keycloak..."
          
          # Check if domain is already bound
          EXISTING_DOMAINS=$(az containerapp hostname list \
            --name workshelf-keycloak \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?name=='auth.workshelf.dev'].name" -o tsv)
          
          if [ -z "$EXISTING_DOMAINS" ]; then
            echo "Adding domain binding..."
            az containerapp hostname bind \
              --hostname auth.workshelf.dev \
              --name workshelf-keycloak \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --environment ${{ secrets.AZURE_CONTAINER_ENV }} \
              --validation-method HTTP
            echo "✅ Domain auth.workshelf.dev bound successfully"
          else
            echo "✅ Domain auth.workshelf.dev already bound"
          fi

      - name: Deploy frontend to Azure Container Apps
        run: |
          echo "🔄 Updating frontend container app..."
          
          # Update with latest tag and force new revision
          az containerapp update \
            --name workshelf-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/workshelf-frontend:latest \
            --revision-suffix run-${{ github.run_number }}
          
          echo "✅ Update complete. Waiting for rollout..."
          sleep 10
          
          # Verify the new image is running
          CURRENT_IMAGE=$(az containerapp show \
            --name workshelf-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].image" -o tsv)
          
          echo "📦 Current running image: $CURRENT_IMAGE"
          echo "Expected: ${{ secrets.ACR_LOGIN_SERVER }}/workshelf-frontend:latest"

      - name: Get deployment URLs
        run: |
          echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          BACKEND_URL=$(az containerapp show \
            --name workshelf-backend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          
          FRONTEND_URL=$(az containerapp show \
            --name workshelf-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          
          echo "### 📍 URLs:" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: https://$BACKEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: https://$FRONTEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **API Docs**: https://$BACKEND_URL/api/docs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Quick Tests:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Health check" >> $GITHUB_STEP_SUMMARY
          echo "curl https://$BACKEND_URL/health" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# API status" >> $GITHUB_STEP_SUMMARY
          echo "curl https://$BACKEND_URL/api/v1/status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
